name: Release

on:
  push:
    tags:
      - "v*"

# Least-privilege top-level; jobs opt into `contents: write`, `id-token: write`,
# and `attestations: write` as needed.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p aegispq-cli

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGING="aegispq-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/aegispq" "$STAGING/"
          cp LICENSE-MIT LICENSE-APACHE README.md "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"
          echo "ASSET=$STAGING.tar.gz" >> $GITHUB_ENV
          echo "CHECKSUM=$STAGING.tar.gz.sha256" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $STAGING = "aegispq-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $STAGING
          Copy-Item "target/${{ matrix.target }}/release/aegispq.exe" "$STAGING/"
          Copy-Item LICENSE-MIT, LICENSE-APACHE, README.md "$STAGING/"
          Compress-Archive -Path "$STAGING/*" -DestinationPath "$STAGING.zip"
          $hash = (Get-FileHash "$STAGING.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $STAGING.zip" | Out-File -Encoding ascii "$STAGING.zip.sha256"
          echo "ASSET=$STAGING.zip" >> $env:GITHUB_ENV
          echo "CHECKSUM=$STAGING.zip.sha256" >> $env:GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}

  publish-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      # contents: write  — create the release and upload assets
      # id-token:  write — OIDC token for sigstore keyless signing
      # attestations: write — generate SLSA build provenance attestations
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Collect release files and canonical checksum manifest
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          # Canonical single manifest; this is the file users verify to bootstrap trust.
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Sign each archive and the SHA256SUMS manifest with cosign keyless
        run: |
          set -euo pipefail
          cd release
          for f in *.tar.gz *.zip SHA256SUMS; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem" \
              "$f"
          done

      - name: Attest SLSA build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release/*.tar.gz
            release/*.zip
            release/SHA256SUMS

      - name: Compose release body
        env:
          VERIFY_DOC_URL: https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/VERIFYING_RELEASES.md
        run: |
          set -euo pipefail
          FENCE='```'
          {
            printf '## Signed release\n\n'
            printf 'Every archive in this release is signed with [cosign](https://github.com/sigstore/cosign) keyless signing via GitHub OIDC and has a [SLSA build provenance](https://slsa.dev/) attestation. See [`docs/VERIFYING_RELEASES.md`](%s) for step-by-step verification.\n\n' "$VERIFY_DOC_URL"
            printf '## SHA256 checksums\n\n'
            printf '%s\n' "$FENCE"
            cat release/SHA256SUMS
            printf '%s\n' "$FENCE"
          } > release/RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.zip
            release/*.sig
            release/*.pem
            release/SHA256SUMS
          body_path: release/RELEASE_BODY.md
