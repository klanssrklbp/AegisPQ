name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p aegispq-cli

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGING="aegispq-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/aegispq" "$STAGING/"
          cp LICENSE-MIT LICENSE-APACHE README.md "$STAGING/"
          tar czf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"
          echo "ASSET=$STAGING.tar.gz" >> $GITHUB_ENV
          echo "CHECKSUM=$STAGING.tar.gz.sha256" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $STAGING = "aegispq-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $STAGING
          Copy-Item "target/${{ matrix.target }}/release/aegispq.exe" "$STAGING/"
          Copy-Item LICENSE-MIT, LICENSE-APACHE, README.md "$STAGING/"
          Compress-Archive -Path "$STAGING/*" -DestinationPath "$STAGING.zip"
          $hash = (Get-FileHash "$STAGING.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $STAGING.zip" | Out-File -Encoding ascii "$STAGING.zip.sha256"
          echo "ASSET=$STAGING.zip" >> $env:GITHUB_ENV
          echo "CHECKSUM=$STAGING.zip.sha256" >> $env:GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}

  publish-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release/ \;
          echo "## SHA256 Checksums" > release/CHECKSUMS.txt
          echo '```' >> release/CHECKSUMS.txt
          cat release/*.sha256 >> release/CHECKSUMS.txt
          echo '```' >> release/CHECKSUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: release/*
          body_path: release/CHECKSUMS.txt
