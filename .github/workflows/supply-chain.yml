name: Supply chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-check against the advisory DB every day at 06:00 UTC so that new
    # CVEs against already-merged dependencies are surfaced without waiting
    # for the next push.
    - cron: "0 6 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each check reports independently so a license violation doesn't
        # mask a CVE and vice versa.
        checks: [advisories, bans, licenses, sources]
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
